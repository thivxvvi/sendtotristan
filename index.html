<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send Me A Secret</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- Send Form -->
    <div class="card" id="form-card">
      <h1>Send Tristan A Massage</h1>
      <p class="subtitle">&#x1F512; 100% Anonymous</p>

      <div class="error-box" id="send-error">Failed to send. Please try again.</div>

      <textarea
        id="message-input"
        placeholder="Type your anonymous message here..."
        maxlength="500"
        oninput="updateCount()"
      ></textarea>
      <div class="char-count"><span id="char-count">0</span>/500</div>

      <button class="btn btn-green" id="send-btn" onclick="sendMessage()">
        &#x27A4; Send Message
      </button>
    </div>

    <!-- Success Box -->
    <div class="card success-box" id="success-card">
      <div class="check">&#x2705;</div>
      <p>Message Sent!<br/>It's a secret to everybody.</p>
      <button class="btn btn-outline" onclick="resetForm()">Send Another</button>
    </div>

    <a class="admin-link" href="messages.html">[ Admin Login ]</a>
  </div>

  <script>
    function updateCount() {
      const input = document.getElementById('message-input');
      document.getElementById('char-count').textContent = input.value.length;
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const content = input.value.trim();
      const errorBox = document.getElementById('send-error');
      const btn = document.getElementById('send-btn');

      if (!content) return;

      errorBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });

        if (!res.ok) throw new Error('Server error');

        document.getElementById('form-card').style.display = 'none';
        document.getElementById('success-card').style.display = 'block';
      } catch (e) {
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '✤ Send Message';
      }
    }

    function resetForm() {
      document.getElementById('message-input').value = '';
      document.getElementById('char-count').textContent = '0';
      document.getElementById('success-card').style.display = 'none';
      document.getElementById('form-card').style.display = 'block';
      document.getElementById('send-btn').disabled = false;
      document.getElementById('send-btn').textContent = '➤ Send Message';
    }
  </script>
</body>
</html>
